<!DOCTYPE>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        
        <title>Bootstrap responsive Color pallet</title>
    </head>
    <body>
        <div class = "container">
            <div class = "row">
                <div class = "m-2 p-2 bg-primary col-12 col-sm-6 col-md-4  col-lg-3 col-xl-2">
                    <h1>Primary</h1>
                </div>

                <div class = "m-2 p-2 bg-secondary col-12 col-sm-6 col-md-4  col-lg-3 col-xl-2">
                    <h1>Secondary</h1>
                </div>

                <div class = "m-2 p-2 bg-success col-12 col-sm-6 col-md-4  col-lg-3 col-xl-2">
                    <h1>Green</h1>
                </div>

                <div class = "m-2 p-2 bg-danger col-12 col-sm-6 col-md-4  col-lg-3 col-xl-2">
                    <h1>Danger</h1>
                </div>

                <div class = "m-2 p-2 bg-warning col-12 col-sm-6 col-md-4  col-lg-3 col-xl-2">
                    <h1>Warning</h1>
                </div>

                <div class = "m-2 p-2 bg-info col-12 col-sm-6 col-md-4  col-lg-3 col-xl-2">
                    <h1>Info</h1>
                </div>

                <div class = "m-2 p-2 bg-dark col-12 col-sm-6 col-md-4  col-lg-3 col-xl-2">
                    <h1 class = "text-light">Dark</h1>
                </div>

                <div class = "m-2 p-2 bg-light col-12 col-sm-6 col-md-4  col-lg-3 col-xl-2">
                    <h1>Light</h1>
                </div>

            </div>

        </div>
    </body>
</html>
